{% extends "base.html" %}

{% block head %}
<title>LabForge - QnA</title>
{% endblock %}

{% block body %}

<h2>Enter Questions, Code and Output</h2>

<form method="POST" action="/QnA">

    <!-- ===== Hidden Metadata ===== -->
    <input type="hidden" name="name" value="{{ name }}">
    <input type="hidden" name="roll_no" value="{{ roll_no }}">
    <input type="hidden" name="lab_no" value="{{ lab_no }}">
    <input type="hidden" name="date" value="{{ date }}">
    <input type="hidden" name="language" value="{{ language }}">
    <input type="hidden" name="num_questions" value="{{ num_questions }}">

    <!-- ===== Dynamic Question Blocks ===== -->
    {% for i in range(1, num_questions + 1) %}

        <div style="margin-bottom: 25px;">

            <h3>Question {{ i }}</h3>
            <textarea 
                name="question_{{ i }}" 
                rows="4" 
                placeholder="Enter Question {{ i }} here..."
                required></textarea>

            <br><br>

            <h4>Code {{ i }}</h4>
            <textarea 
                name="code_{{ i }}" 
                rows="8" 
                placeholder="Paste your code here..."
                required></textarea>

            <br><br>

            <h4>Output {{ i }}</h4>
            <textarea 
                name="output_{{ i }}" 
                rows="4" 
                placeholder="Paste output here..."
                required></textarea>

            <hr style="margin-top:20px;">

        </div>

    {% endfor %}

    <button type="submit">Generate Lab Report</button>

</form>

{% endblock %}
